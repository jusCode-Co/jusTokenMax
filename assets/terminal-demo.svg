<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 612" width="780" height="612" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="jusTokenMax: install, run tests, and measured token-reduction results (real-world tasks first, then single inputs)">
  <rect width="780" height="612" rx="12" fill="#000000" stroke="#3a3a3a"/>
  <!-- title bar -->
  <rect width="780" height="34" rx="12" fill="#0c0c0c"/>
  <rect y="22" width="780" height="12" fill="#0c0c0c"/>
  <circle cx="22" cy="17" r="6" fill="#4a4a4a"/>
  <circle cx="42" cy="17" r="6" fill="#3a3a3a"/>
  <circle cx="62" cy="17" r="6" fill="#2c2c2c"/>
  <text x="390" y="21" text-anchor="middle" font-size="12" fill="#777">jusTokenMax — token-reduction toolkit</text>

  <g font-size="14">
    <text x="22" y="66"><tspan fill="#6e7681">$ </tspan><tspan fill="#ffffff">pip install ./python pypdf Pillow</tspan></text>
    <text x="22" y="86" fill="#9aa0a6">  installed the `justokenmax` CLI</text>

    <text x="22" y="116"><tspan fill="#6e7681">$ </tspan><tspan fill="#ffffff">pytest -q</tspan></text>
    <text x="22" y="136" fill="#9aa0a6">  ............................................ <tspan fill="#ffffff">117 passed</tspan></text>

    <text x="22" y="166"><tspan fill="#6e7681">$ </tspan><tspan fill="#ffffff">justokenmax optimize report.pdf build.log api.json data.csv</tspan></text>
    <text x="22" y="186" fill="#9aa0a6">  pdf 16k<tspan fill="#fff">&#8594;</tspan>7k   log 31k<tspan fill="#fff">&#8594;</tspan>0.3k   json 168k<tspan fill="#fff">&#8594;</tspan>0.4k   csv 45k<tspan fill="#fff">&#8594;</tspan>0.2k</text>

    <text x="22" y="216"><tspan fill="#6e7681">$ </tspan><tspan fill="#ffffff">justokenmax stats</tspan></text>
    <text x="22" y="236" fill="#9aa0a6">  <tspan fill="#ffffff">480,000+</tspan> tokens saved</text>
  </g>

  <line x1="22" y1="258" x2="758" y2="258" stroke="#2a2a2a"/>
  <text x="22" y="284" font-size="12" letter-spacing="1.5" fill="#9aa0a6">TOKEN REDUCTION  ·  measured</text>

  <!-- bar chart: track x=300 width=360 (=100%) -->
  <g font-size="13" fill="#cfcfcf">
    <text x="22" y="306" font-size="11" letter-spacing="1" fill="#7d8590">REAL-WORLD TASKS (whole project, one pass)</text>
    <g>
      <text x="22" y="332">Extend a website codebase</text>
      <rect x="300" y="321" width="360" height="15" fill="#171717"/>
      <rect x="300" y="321" width="216" height="15" fill="#e6e6e6"><animate attributeName="width" from="0" to="216" dur="0.9s" begin="0.1s" fill="freeze"/></rect>
      <text x="670" y="332" fill="#ffffff" font-weight="bold">-60%</text>
    </g>
    <g>
      <text x="22" y="362">Build a project from a PRD *</text>
      <rect x="300" y="351" width="360" height="15" fill="#171717"/>
      <rect x="300" y="351" width="277" height="15" fill="#e6e6e6"><animate attributeName="width" from="0" to="277" dur="0.9s" begin="0.2s" fill="freeze"/></rect>
      <text x="670" y="362" fill="#ffffff" font-weight="bold">-77%</text>
    </g>

    <text x="22" y="396" font-size="11" letter-spacing="1" fill="#7d8590">SINGLE INPUTS</text>
    <g>
      <text x="22" y="422">PDF &#8594; Markdown</text>
      <rect x="300" y="411" width="360" height="15" fill="#171717"/>
      <rect x="300" y="411" width="202" height="15" fill="#bdbdbd"><animate attributeName="width" from="0" to="202" dur="0.9s" begin="0.3s" fill="freeze"/></rect>
      <text x="670" y="422" fill="#ffffff" font-weight="bold">-56%</text>
    </g>
    <g>
      <text x="22" y="452">Build / CI log</text>
      <rect x="300" y="441" width="360" height="15" fill="#171717"/>
      <rect x="300" y="441" width="356" height="15" fill="#bdbdbd"><animate attributeName="width" from="0" to="356" dur="0.9s" begin="0.4s" fill="freeze"/></rect>
      <text x="670" y="452" fill="#ffffff" font-weight="bold">-99%</text>
    </g>
    <g>
      <text x="22" y="482">JSON / API response</text>
      <rect x="300" y="471" width="360" height="15" fill="#171717"/>
      <rect x="300" y="471" width="356" height="15" fill="#bdbdbd"><animate attributeName="width" from="0" to="356" dur="0.9s" begin="0.5s" fill="freeze"/></rect>
      <text x="670" y="482" fill="#ffffff" font-weight="bold">-99%</text>
    </g>
    <g>
      <text x="22" y="512">CSV (5,000 rows)</text>
      <rect x="300" y="501" width="360" height="15" fill="#171717"/>
      <rect x="300" y="501" width="356" height="15" fill="#bdbdbd"><animate attributeName="width" from="0" to="356" dur="0.9s" begin="0.6s" fill="freeze"/></rect>
      <text x="670" y="512" fill="#ffffff" font-weight="bold">-99%</text>
    </g>
    <g>
      <text x="22" y="542">Find a symbol vs read file</text>
      <rect x="300" y="531" width="360" height="15" fill="#171717"/>
      <rect x="300" y="531" width="349" height="15" fill="#bdbdbd"><animate attributeName="width" from="0" to="349" dur="0.9s" begin="0.7s" fill="freeze"/></rect>
      <text x="670" y="542" fill="#ffffff" font-weight="bold">-97%</text>
    </g>
  </g>

  <text x="22" y="576" font-size="11" fill="#6e7681">* whole-task, one pass (532,789 &#8594; 117,354 tokens); compounds on re-reads</text>
  <text x="22" y="598" font-size="11" fill="#6e7681">github.com/Kalmantic/jusTokenMax  ·  zero-dependency · reversible · MIT</text>
</svg>
